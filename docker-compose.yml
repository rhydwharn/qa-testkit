version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: qa_tm
      POSTGRES_USER: qa_tm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qa_tm"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://qa_tm:${POSTGRES_PASSWORD:-changeme}@postgres:5432/qa_tm
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-this-secret-in-production}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  # Run migrations on startup
  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: builder
    command: ["sh", "-c", "cd apps/web && pnpm prisma migrate deploy && pnpm db:seed"]
    environment:
      DATABASE_URL: postgresql://qa_tm:${POSTGRES_PASSWORD:-changeme}@postgres:5432/qa_tm
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
